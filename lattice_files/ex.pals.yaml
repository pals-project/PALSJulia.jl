PALS:
  facility:

    - constants:
        a_const: 0.3 * r_electron
        b_const: 0.45

    - variables:
        a_var: a_const^2
        b_var: 0.37 * atan2(0.1, 0.2)

    - include: "include.pals.yaml"

    - lat1:
        kind: Lattice
        branches:
          - inj_line

    - lat2:
        kind: Lattice
        branches:
          - a_subline

    - inj_line:
        kind: BeamLine
        multipass: true
        length: 37.8
        zero_point: thingC
        line:                # This item refers to the name of an element or BeamLine defined elsewhere.
          - thingZ:               # thingZ inherits parameters from thingB
              inherit: thingB
          - Q1a:                  # Define an element in place called Q1a
              kind: Quadrupole
              length: 1.03 * pi / c_light
              direction: -1
          - a_subline:
              repeat: 2           # Item a_subline is repeated two times



    - use: "lat2"
    - use: "lat1"
