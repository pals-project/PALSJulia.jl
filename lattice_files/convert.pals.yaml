PALS:
  facility:
    - beg:
        kind: BeginningEle
        length: 0
        ReferenceP:
          species_ref: electron
          pc_ref: 3E6
        ParticleP:
          x: 1
          y: 2
          z: 3
          px: 4
          py: 5
          pz: 6
    - ap1:
        kind: Aperture
        length: 1
        ApertureP:
          x_min: 1
          x_max: 2
          y_min: 3
          y_max: 4
          shape: ELLIPTICAL
          location: ENTRANCE_END
          vertices: []  
          material: "" 
          thickness: 0     
          aperture_shifts_with_body: false
          aperture_active: true        
    - marker1:
        kind: Marker
    - drift1:
        kind: Drift
        length: 100
    - ap2:
        kind: Aperture
        length: 0
        ApertureP:
          x_width: 2
          y_width: 4
    - s1:
        kind: SBend
        length: 10
        BendP:
          rho_ref: 4.2         # [radian] Reference bend angle
          bend_field_ref: 1.2  # [T] Reference bend field
          e1: 9.1              # [radian] Entrance end pole face rotation with respect to a sector geometry
          e2: -10.2              # [radian] Exit end pole face rotation with respect to a sector geometry
          e1_rect: 1.1         # [radian] Entrance end pole face rotation with respect to a rectangular geometry
          e2_rect: 1.2        # [radian] Exit end pole face rotation with respect to a rectangular geometry
          edge1_int: 1.3       # [T*m] Entrance end fringe field integral
          edge2_int: 1.4       # [T*m] Exit end fringe field integral
          g_ref: 1.5           # [1/m] Reference bend strength = 1/radius_ref
          h1: 1.6              # [1/m] Entrance end pole face curvature
          h2: 1.7              # [1/m] Exit end pole face curvature
          L_chord: 1.8         # [m] Chord length. 
          L_sagitta: 1.9       # [m] Sagitta length. Output parameter.  
          tilt_ref: 2.0        # [radian] Reference tilt
        BodyShiftP:
          x_offset: 9.1       # [m] Offset along x-axis
          y_offset: 9.2       # [m] Offset along y-axis
          z_offset: 9.3       # [m] Offset along z-axis
          x_rot: -1          # [radians] Rotation around x-axis
          y_rot: -2          # [radians] Rotation around y-axis
          z_rot: -3          # [radians] Rotation around z-axis
    - quad1:
        kind: Quadrupole
        length: 0.01
        MagneticMultipoleP:
          tilt1: 1
          Kn1: 32
          Ks1: 10
        ReferenceChangeP:
          dE_ref: -0.2
    - sext1:
        kind: Sextupole
        length: 0.02
        MagneticMultipoleP:
          tilt3: 1 
          Bn3L: 32
          Bs3L: 10
    - sol1:
        kind: Solenoid
        SolenoidP:
          Ksol: 10
    - multipole1:
        kind: Multipole
        length: 37.6
        MagneticMultipoleP:
          tilt1: 1
          tilt2: 2
          tilt4: 10.3
          Kn9L: 11
          tilt9: 2
          Bn4L: 2
          Bs4L: 3
          Kn2: 1
          Ks2: 10
          Bn1: 3
          Bs1: 9
          Ks9L: 12
        TrackingP:
          SciBmad:
            tracking_method: scibmad_standard
    - patch4:
        kind: Patch
        length: 0
        PatchP:
          x_offset: 1.1          # Offset in x-direction.
          y_offset: 1.2          # Offset in y-direction.
          z_offset: 1.3           # Offset in z-direction.
          x_rot: 1.4             # Rotation around x-axis.
          y_rot: 1.5             # Rotation around y-axis.
          z_rot: 1.6             # Rotation around z-axis.
          flexible: true          # Default is False.
                            #    true -> User sets offsets and rot. 
                            #    False -> Offsets and rot from branch layout. 
          ref_coords: entrance_end        # Coordinate system defining the length
          user_sets_length: true  # Default is False. Is the element length User set? 
    - rfcav1:
        kind: RFCavity
        length: 1.3
        RFP:
          frequency: 100000                # [Hz] RF frequency
          # harmon: 0                     # [unitless] RF frequency harmonic number
          voltage: 100                    # [V] RF voltage
          gradient: 0.2                   # [V/m] RF gradient
          phase: 3.1                      # [unitless] RF phase in 0 to 2*pi
          multipass_phase: 2            # [unitless] RF Phase added to multipass elements
          cavity_type: STANDING_WAVE    # [string] Cavity type
          n_cell: 1                     # [unitles] Number of cavity cells
          zero_phase: ACCELERATING      # [enum] Sets what phase = 0 means.

    - rfcav2:
        kind: RFCavity
        length: 1.3
        RFP:
          # frequency: 100000                # [Hz] RF frequency
          harmon: 2000                     # [unitless] RF frequency harmonic number
          voltage: 100                    # [V] RF voltage
          gradient: 0.2                   # [V/m] RF gradient
          phase: 3.1                      # [unitless] RF phase in 0 to 2*pi
          multipass_phase: 2            # [unitless] RF Phase added to multipass elements
          cavity_type: STANDING_WAVE    # [string] Cavity type
          n_cell: 1                     # [unitles] Number of cavity cells
          zero_phase: BELOW_TRANSITION      # [enum] Sets what phase = 0 means.

    - rfcav3:
        kind: RFCavity
        length: 1.3
        RFP:
          # frequency: 100000                # [Hz] RF frequency
          # harmon: 2000                     # [unitless] RF frequency harmonic number
          voltage: 100                    # [V] RF voltage
          gradient: 0.2                   # [V/m] RF gradient
          phase: 3.1                      # [unitless] RF phase in 0 to 2*pi
          multipass_phase: 2            # [unitless] RF Phase added to multipass elements
          cavity_type: TRAVELING_WAVE    # [string] Cavity type
          n_cell: 1                     # [unitles] Number of cavity cells
          zero_phase: ABOVE_TRANSITION      # [enum] Sets what phase = 0 means.
    - beambeam1:
        kind: BeamBeam
        length: 0.2
        BeamBeamP:
          sigma_x: 1   # [m] The horizontal beam size of the opposite beam. 
          sigma_y: 2   # [m] The vertical beam size of the opposite beam. 
          sigma_z: 3   # [m] The longitudinal beam size of the opposite beam. 
          alpha_x: 4   # [unitless] The horizontal Twiss parameter alpha at interaction point. 
          beta_x:  5   # [m] The horizontal Twiss parameter beta at interaction point. 
          alpha_y: 6   # [unitless] The vertical Twiss parameter alpha at interaction point. 
          beta_y: 7    # [m] The vertical Twiss parameter beta at interaction point. 
          charge: 1    # [unitless] The charge of the opposite beam. 
          energy: 2E10    # [eV] The total energy in eV of the opposite beam. 
          N_particle: 1E3  # [unitless] Number of particles in the opposite beam. 
    - ring: 
        kind: BeamLine
        line:
          - beg:
              kind: BeginningEle
              length: 0
              ReferenceP:
                species_ref: electron
                pc_ref: 3E6
              ParticleP:
                x: 1
                y: 2
                z: 3
                px: 4
                py: 5
                pz: 6
          - marker1
          - ap1
          - drift1
          - ap2
          - s1
          - quad1
          - sext1:
              kind: Sextupole
              length: 0.02
              MagneticMultipoleP:
                tilt3: 1 
                Bn3L: 32
                Bs3L: 10t1
          - sol1
          - multipole1
          - patch1  
          - rfcav1
          - rfcav2
          - rfcav3  
          - beambeam1
    - lat: 
        kind: Lattice
        branches: 
          - ring
