name: Julia Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.11', '1.12']
        os: [macos-latest, ubuntu-latest]
    
    steps: 
      - name: Checkout PALSJulia repository
        uses: actions/checkout@v5
        with:
          path: PALSJulia


      - name: Checkout pals-cpp repository
        uses: actions/checkout@v5
        with:
          repository: pals-project/pals-cpp
          path: pals-cpp

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      # pals-cpp fetches rapidyaml (and the rest) itself via CMake FetchContent,
      # so a compiler and CMake are all that is needed. Both runners ship CMake
      # preinstalled; only Linux needs a compiler pulled in explicitly.
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build C++ library
        run: |
          cd pals-cpp
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc 2>/dev/null || echo 2)
          ls -lah
        shell: bash

      - name: Run tests
        run: |
          cd $GITHUB_WORKSPACE/PALSJulia

          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test()
          '

          
      - name: Upload test results 
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-julia-${{ matrix.julia-version }}
          path: |
            test/*.log
            *.yaml